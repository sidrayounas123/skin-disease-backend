[build]
builder = "nixpacks"

[deploy]
startCommand = "python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

[[services]]
name = "api"
source = "."
memoryLimit = "512Mi"
cpuLimit = "1000m"

[variables]
PYTHON_VERSION = "3.11"
PORT = "8000"
